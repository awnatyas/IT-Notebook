<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel IT Notebook</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Awan's IT Notebook</h1>
        <p>Journey Menjadi Developer</p>
    </header>

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="Cari catatan..."
            onkeyup="searchNotes()"
        >

    </div>

    <div id="searchResults"></div>

    <main>

        <!-- MENU UTAMA -->

        <section id="home">

            <div class="subject">

                <h2>🐍 Python</h2>

                <div class="sub-grid">

                    <div class="sub-card" onclick="openNote('python-syntax')">
                        Dasar Syntax
                    </div>

                    <div class="sub-card" onclick="openNote('python-function')">
                        Function
                    </div>

                    <div class="sub-card" onclick="openNote('python-oop')">
                        OOP
                    </div>

                    <div class="sub-card" onclick="openNote('python-file')">
                        File Handling
                    </div>

                    <div class="sub-card" onclick="openNote('python-project')">
                        Project
                    </div>

                </div>

            </div>


            <div class="subject">

                <h2>🌳 Git</h2>

                <div class="sub-grid">

                    <div class="sub-card" onclick="openNote('git-basic')">
                        Basic Command
                    </div>

                    <div class="sub-card" onclick="openNote('git-branch')">
                        Branch
                    </div>

                    <div class="sub-card" onclick="openNote('git-merge')">
                        Merge
                    </div>

                    <div class="sub-card" onclick="openNote('git-github')">
                        GitHub
                    </div>

                    <div class="sub-card" onclick="openNote('git-project')">
                        Project
                    </div>

                </div>

            </div>


            <div class="subject">

                <h2>🗄 SQL</h2>

                <div class="sub-grid">

                    <div class="sub-card" onclick="openNote('sql-select')">
                        SELECT
                    </div>

                    <div class="sub-card" onclick="openNote('sql-where')">
                        WHERE
                    </div>

                    <div class="sub-card" onclick="openNote('sql-join')">
                        JOIN
                    </div>

                    <div class="sub-card" onclick="openNote('sql-table')">
                        Table
                    </div>

                    <div class="sub-card" onclick="openNote('sql-project')">
                        Project
                    </div>

                </div>

            </div>

        </section>

        <!-- HALAMAN NOTE -->

        <section id="notePage" class="hidden">

            <button onclick="goBack()">⬅ Kembali</button>

            <h2 id="noteTitle"></h2>

            <textarea
                id="noteContent"
                placeholder="Tulis catatanmu di sini..."
            ></textarea>

            <button onclick="saveNote()">
                💾 Simpan Catatan
            </button>

        </section>

    </main>

<script src="script.js"></script>
</body>
</html>
